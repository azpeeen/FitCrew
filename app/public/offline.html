<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FitCrew — Sem conexão</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #121212;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 24px;
      text-align: center;
    }
    .logo { width: 80px; height: 80px; border-radius: 16px; }
    .icon {
      font-size: 3.5rem;
      line-height: 1;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50%       { transform: scale(1.08); opacity: 0.75; }
    }
    h1 { font-size: 1.6rem; font-weight: 700; color: #FFD700; }
    p  { font-size: 0.95rem; color: #aaa; max-width: 320px; line-height: 1.6; }
    .btn {
      margin-top: 8px;
      background: linear-gradient(135deg, #FFD700, #FFA500);
      color: #000;
      border: none;
      padding: 12px 28px;
      border-radius: 24px;
      font-size: 0.95rem;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      box-shadow: 0 2px 14px rgba(255,215,0,0.3);
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(255,215,0,0.5); }
    .hint { font-size: 0.78rem; color: #555; margin-top: -8px; }
  </style>
</head>
<body>
  <img src="/images/logo.png" alt="FitCrew" class="logo" onerror="this.style.display='none'">
  <p class="icon">📶</p>
  <h1>Você está offline</h1>
  <p>Sem conexão com a internet. Verifique seu Wi-Fi ou dados móveis e tente novamente.</p>
  <button class="btn" onclick="window.location.reload()">Tentar novamente</button>
  <p class="hint">As páginas visitadas recentemente ainda podem estar disponíveis.</p>
</body>
</html>
